# customer-subgraph/gqlgen.yml
schema:
  - graph/*.graphqls
exec:
  filename: graph/generated.go
  package: graph
model:
  filename: graph/model/models_gen.go
  package: model
# resolver:
#   dir: resolvers
#   package: resolvers
#   filename: resolvers/schema.resolvers.go
federation:
  filename: graph/federation.go
  package: graph
  version: 2

models:
  Customer:
    model: customer-subgraph/graph/model.Customer
  Transaction:
    model: customer-subgraph/graph/model.Transaction
  Bet:
    model: customer-subgraph/graph/model.Bet
    fields:
      amount:
        resolver: true
      gameID:
        resolver: true
  Game:
    model: customer-subgraph/graph/model.Game
    fields:
      isMatch:
        resolver: true

